version: 2
# Dependabot setup (2026-05-09):
#   - Greenfield config for TraigentSchema. Schema is mostly inert JSON +
#     a thin Python validator (jsonschema), so monthly cadence with a
#     single grouped PR per ecosystem is enough.
#   - target-branch: "develop" so PRs flow through the develop → main
#     promote cycle.
#   - open-pull-requests-limit: 1 per ecosystem — at most 2 PRs/month total
#     (pip + github-actions).
#   - groups: single catch-all version-updates group covering
#     patch+minor+major; security-updates kept distinct so they merge fast.
#   - Security updates (CVE-driven) still flow via GitHub's separate
#     Dependabot Security Updates code path.

updates:
  # Python dependencies — pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "automated"

    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — monthly, all bumps grouped into 1 PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"
    ignore:
      - dependency-name: "SonarSource/sonarqube-scan-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "codecov/codecov-action"
        update-types: ["version-update:semver-major"]
