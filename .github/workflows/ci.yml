name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  merge_group: {}
  schedule:
    - cron: '0 6 * * *'   # nightly: full Python matrix (3.9-3.12)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # PR events: collapse re-pushes onto one in-flight run (cancel stale).
  # merge_group events: NEVER cancel — a cancelled queue candidate fails its
  # required gate and stalls the queue. Key non-PR runs by run_id; only
  # cancel-in-progress for pull_request.
  group: schema-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Lint + type-check are version-independent: run ONCE instead of per matrix entry.
  lint-type:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run linting
        run: ruff check traigent_schema/
      - name: Run type checking
        run: mypy traigent_schema/ --ignore-missing-imports

  test:
    # Gate expensive matrix tests behind the cheap lint/type job.
    needs: lint-type
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # develop PR -> newest only; main PR/push -> 2 newest; nightly schedule -> full matrix.
        python-version: ${{ fromJSON( github.event_name == 'schedule' && '["3.9","3.10","3.11","3.12"]' || (github.event_name == 'pull_request' && github.base_ref == 'develop') && '["3.12"]' || '["3.11","3.12"]' ) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=traigent_schema --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  package:
    # Gate package build behind the cheap lint/type job.
    needs: lint-type
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package metadata
        run: |
          twine check dist/*

      - name: Test installation from built wheel
        run: |
          python -m venv test_env
          source test_env/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python - <<'PY'
          import traigent_schema
          from traigent_schema import SchemaValidator, load_schema

          print(f"Package test: traigent-schema v{traigent_schema.__version__}")
          print(f"Schemas loaded: {len(SchemaValidator().available_schemas)}")
          print(load_schema("experiment_schema")["$schema"])
          PY

  ci-required:
    name: ci-required
    # Always run (even if a dep failed/was skipped) so the required context
    # always posts — including on merge_group candidates. Fails closed: any dep
    # that is neither success nor skipped (e.g. a lint failure that skipped the
    # downstream test/package jobs surfaces as lint-type=failure here) fails the gate.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-type, test, package]
    steps:
      - name: Verify required CI jobs
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.lint-type.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.package.result }}"; do
            case "$result" in
              success|skipped) ;;
              *)
                echo "::error::Required CI dependency finished with ${result}"
                exit 1
                ;;
            esac
          done
          echo "ci-required passed"
