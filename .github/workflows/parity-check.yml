name: Parity manifest up-to-date check

# Item 7 from TraigentSchema issue #132:
# Verify parity/python-js-sdk.json is stamped against the current schema files
# on every PR that touches either the schema tree or the parity manifest itself.
#
# If this check fails, run:
#     python scripts/refresh_parity.py --update
# and commit the updated parity/python-js-sdk.json.

on:
  pull_request:
    paths:
      - "traigent_schema/schemas/**"
      - "parity/**"
      - "scripts/refresh_parity.py"

permissions:
  contents: read

jobs:
  parity-check:
    name: Parity manifest freshness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package (needed for traigent_schema.schemas path)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check parity manifest is up-to-date
        id: parity
        run: |
          python scripts/refresh_parity.py --check
        # Fail loudly with an actionable message if stale.
        # The script itself prints the fix command to stderr on failure.

      - name: Show fix instructions on failure
        if: failure() && steps.parity.outcome == 'failure'
        run: |
          echo "::error title=Parity manifest stale::Schema files changed without updating parity/python-js-sdk.json."
          echo ""
          echo "Fix: run the following locally, then commit the result:"
          echo ""
          echo "    python scripts/refresh_parity.py --update"
          echo "    git add parity/python-js-sdk.json"
          echo "    git commit -m 'chore(schema): refresh parity manifest'"
          echo ""
          echo "If you also added or removed symbols from the Python or JS SDK surface,"
          echo "update the 'classifications' and 'requiredRootExports' sections of the"
          echo "manifest by hand before committing."
