name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      confirm_publish:
        description: "Set to true to allow publishing"
        required: true
        default: false
        type: boolean

jobs:
  verify-release-ref:
    name: Verify exact main release ref
    if: inputs.confirm_publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      verified_sha: ${{ steps.verify.outputs.verified_sha }}

    steps:
      - name: Checkout dispatched commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Verify dispatch is the current main commit
        id: verify
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$DISPATCH_REF" != "refs/heads/main" ]; then
            echo "::error::Publishing is allowed only from refs/heads/main (got $DISPATCH_REF)"
            exit 1
          fi

          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          CURRENT_MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          if [ "$CHECKED_OUT_SHA" != "$DISPATCH_SHA" ] || [ "$CURRENT_MAIN_SHA" != "$DISPATCH_SHA" ]; then
            echo "::error::Dispatch SHA, checkout SHA, and current main SHA must match exactly"
            echo "dispatch=$DISPATCH_SHA checkout=$CHECKED_OUT_SHA current_main=$CURRENT_MAIN_SHA"
            exit 1
          fi

          echo "verified_sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"

  publish:
    needs: verify-release-ref
    runs-on: ubuntu-latest
    if: inputs.confirm_publish == true && needs.verify-release-ref.result == 'success'
    environment: ${{ inputs.environment || 'testpypi' }}
    outputs:
      package_version: ${{ steps.package_version.outputs.package_version }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout verified main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.verify-release-ref.outputs.verified_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e ".[dev]"

      - name: Read package version
        id: package_version
        run: |
          VERSION=$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("traigent_schema/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Unable to determine package version")
          print(match.group(1))
          PY
          )
          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
        run: |
          VERSION_FILE="$PACKAGE_VERSION"
          VERSION_IMPORT=$(python -c "import traigent_schema; print(traigent_schema.__version__)")
          echo "version.py: $VERSION_FILE"
          echo "package import: $VERSION_IMPORT"
          if [ "$VERSION_FILE" != "$VERSION_IMPORT" ]; then
            echo "Error: Version mismatch between version.py and package import"
            exit 1
          fi

      - name: Run tests before publishing
        run: |
          pytest tests/ -v --tb=short

      - name: Build package
        run: |
          python -m build

      - name: Check package with twine
        run: |
          twine check dist/*

      - name: Test installation from built package
        run: |
          python -m venv test_env
          source test_env/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python - <<'PY'
          import traigent_schema
          from traigent_schema import SchemaValidator, load_schema

          print(f"traigent-schema v{traigent_schema.__version__} imported successfully")
          print(f"Available schemas: {len(SchemaValidator().available_schemas)}")
          print(load_schema("experiment_schema")["$schema"])
          PY

      - name: Re-verify main has not moved before publishing
        env:
          VERIFIED_SHA: ${{ needs.verify-release-ref.outputs.verified_sha }}
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          CURRENT_MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          if [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ] || [ "$CURRENT_MAIN_SHA" != "$VERIFIED_SHA" ]; then
            echo "::error::Verified release SHA is no longer the exact current main commit"
            echo "verified=$VERIFIED_SHA checkout=$CHECKED_OUT_SHA current_main=$CURRENT_MAIN_SHA"
            exit 1
          fi

      - name: Publish to Test PyPI
        if: inputs.environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Publish to PyPI
        if: inputs.environment == 'pypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          verbose: true

      - name: Create deployment summary
        if: always()
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deployment Summary"
            echo "- **Package**: traigent-schema"
            echo "- **Version**: $PACKAGE_VERSION"
            echo "- **Environment**: $INPUT_ENVIRONMENT"
            echo "- **Status**: $JOB_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-publication:
    needs: publish
    runs-on: ubuntu-latest
    if: always() && needs.publish.result == 'success'
    permissions:
      contents: read

    steps:
      - name: Wait for package propagation
        run: sleep 60

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Test installation from package index
        env:
          EXPECTED_VERSION: ${{ needs.publish.outputs.package_version }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$INPUT_ENVIRONMENT" = "testpypi" ]; then
            PACKAGE_LABEL="TestPyPI"
            PACKAGE_API_URL="https://test.pypi.org/pypi/traigent-schema/json"
            INSTALL_ARGS=(--index-url "https://test.pypi.org/simple/" --extra-index-url "https://pypi.org/simple/")
          else
            PACKAGE_LABEL="PyPI"
            PACKAGE_API_URL="https://pypi.org/pypi/traigent-schema/json"
            INSTALL_ARGS=()
          fi

          VERSION="$EXPECTED_VERSION"
          echo "Testing installation of traigent-schema==$VERSION from $PACKAGE_LABEL"

          curl -fsSL "$PACKAGE_API_URL" -o package.json
          python - "$VERSION" package.json <<'PY'
          import json
          import sys

          version = sys.argv[1]
          path = sys.argv[2]
          with open(path, encoding="utf-8") as handle:
              data = json.load(handle)
          releases = data.get("releases", {})
          if version not in releases or not releases[version]:
              raise SystemExit(f"Version {version} not found on package index")
          print(f"Verified version {version} exists on package index")
          PY

          python -m venv test_env
          source test_env/bin/activate
          pip install --upgrade pip
          pip install "${INSTALL_ARGS[@]}" "traigent-schema==$VERSION"
          python - <<'PY'
          import traigent_schema
          from traigent_schema import SchemaValidator, load_schema

          print(f"Installed traigent-schema v{traigent_schema.__version__}")
          print(f"Available schemas: {len(SchemaValidator().available_schemas)}")
          print(load_schema("experiment_schema")["$schema"])
          PY

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Package successfully published and verified." >> "$GITHUB_STEP_SUMMARY"
          echo "Users can now install with: \`pip install traigent-schema\`" >> "$GITHUB_STEP_SUMMARY"
