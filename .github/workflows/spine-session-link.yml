name: spine-session-link

# Additive policy-surface check. It is intentionally non-required during the
# initial rollout and does not replace the existing Spine Trail Gate.
on:
  pull_request:
    branches: [develop, main]
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:
    branches: [develop, main]
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: spine-session-link-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  require-spine-session:
    name: policy-surface session link (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pass through merge queue candidate
        if: ${{ github.event_name == 'merge_group' }}
        run: echo "Spine session metadata was validated on the pull request; merge-group pass-through."

      - name: Check policy-surface Spine session link
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_BODY: ${{ github.event.pull_request.body }}
          EVENT_PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          POLICY_SURFACE_GLOBS: |
            traigent_schema/schemas/analytics/privacy_mode_schema.json
            traigent_schema/schemas/audit/**
            traigent_schema/schemas/auth/**
            traigent_schema/schemas/billing/**
            traigent_schema/schemas/costs/**
            traigent_schema/schemas/execution/hybrid_session_schema.json
            traigent_schema/schemas/harness_session_record.json
            traigent_schema/schemas/mfa/**
            traigent_schema/schemas/observability/**
            traigent_schema/schemas/projects/**
            traigent_schema/schemas/rate_limit_info_schema.json
            traigent_schema/schemas/security/**
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          current_body="$(mktemp)"
          current_labels="$(mktemp)"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename' > "$changed_files"
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            --jq '.body // ""' > "$current_body"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" \
            --jq '.' > "$current_labels"

          python - "$changed_files" "$current_body" "$current_labels" <<'PY'
          from __future__ import annotations

          import fnmatch
          import json
          import os
          import re
          import sys
          from pathlib import Path

          changed_files = [
              line.strip()
              for line in Path(sys.argv[1]).read_text().splitlines()
              if line.strip()
          ]
          current_body = Path(sys.argv[2]).read_text()
          event_body = os.environ.get("EVENT_PR_BODY") or ""
          body = "\n".join([event_body, current_body])
          labels_payload = json.loads(Path(sys.argv[3]).read_text() or "[]")
          if not labels_payload:
              labels_payload = json.loads(os.environ.get("EVENT_PR_LABELS") or "[]")
          labels = {
              str(label.get("name", "")).strip()
              for label in labels_payload
              if isinstance(label, dict)
          }
          globs = [
              line.strip()
              for line in os.environ["POLICY_SURFACE_GLOBS"].splitlines()
              if line.strip()
          ]
          policy_files = [
              path
              for path in changed_files
              if any(fnmatch.fnmatchcase(path, pattern) for pattern in globs)
          ]

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def summarize(message: str) -> None:
              if summary_path:
                  with Path(summary_path).open("a") as summary:
                      summary.write(f"## Spine session link\n\n{message}\n")

          if not policy_files:
              print("No TraigentSchema policy-surface paths changed; no session link required.")
              summarize("No policy-surface paths changed.")
              raise SystemExit(0)

          session_link = re.search(r"(?mi)^\s*Spine-Session:\s*cs_[0-9a-f]{8,}\s*$", body)
          promoted_session = re.search(r"(?mi)^\s*Spine:\s*cs_[0-9a-z]{6,}\s*$", body)
          waiver = re.search(r"(?mi)^\s*Spine:\s*none\s*\(reason:.+\)\s*$", body)
          trail = re.search(r"(?mi)^\s*Spine-Trail:\s*st_[0-9a-f]{12}\s*$", body)

          if waiver or "spine-exempt" in labels:
              print("::warning::Explicit Spine waiver accepted for policy-surface change.")
              summarize("Explicit `Spine: none (reason: ...)` or `spine-exempt` waiver accepted.")
              raise SystemExit(0)

          if session_link or promoted_session:
              print("Policy-surface change has a linked or promoted Spine session.")
              summarize("Policy-surface change has a linked or promoted Spine session.")
              raise SystemExit(0)

          if trail:
              detail = "A Spine-Trail is present, but policy-surface changes also require a linked or promoted ChangeSession."
          else:
              detail = "No linked or promoted ChangeSession was found."
          print(f"::error::spine-session-link: {detail}")
          print("Add `Spine-Session: cs_<id>` or promote the PR marker to `Spine: cs_<id>`.")
          print("An owner-approved waiver remains `Spine: none (reason: ...)` or the `spine-exempt` label.")
          print("Touched policy-surface files:")
          for path in policy_files[:50]:
              print(f"- {path}")
          summarize(f"{detail} This advisory rollout is not yet a required branch-protection check.")
          raise SystemExit(1)
          PY
