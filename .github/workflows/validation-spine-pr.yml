# Validation Spine — PR-time scope-mode run for TraigentSchema.
#
# Mirrors Traigent SDK's validation-spine-pr.yml. Findings are advisory during
# calibration; infrastructure/configuration failures fail closed so a required
# workflow cannot silently go green.
#
# Schema specializations:
#   - Path filter targets the schema package (traigent_schema/) plus
#     OpenAPI/JSON schema artifacts and tests/.
#   - Particularly relevant for the `assert_in_production` and
#     `weak_crypto_constant` markers (Schema #29/#33 calibration cases
#     came from this repo).
#   - Branches: main + develop (standard Schema PR targets).

name: validation-spine-pr

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "traigent_schema/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/validation-spine-pr.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validation-spine-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spine-token-preflight:
    name: Spine token preflight (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - name: Check validation spine token presence
        id: check
        env:
          ACTOR: ${{ github.actor }}
          SPINE_RO_TOKEN: ${{ secrets.SPINE_RO_TOKEN || secrets.VALIDATION_CI_PAT }}
        run: |
          set -uo pipefail
          if [ -n "${SPINE_RO_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "Validation spine token is configured."
            exit 0
          fi

          echo "has_token=false" >> "$GITHUB_OUTPUT"
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            echo "::notice::SPINE_RO_TOKEN unavailable for dependabot PR (secrets blocked by design); spine scan skipped - dependabot bumps carry no policy surface."
            echo "Dependabot secret exception applied; validation spine scan skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::error::validation-spine-pr (missing-secret): SPINE_RO_TOKEN and VALIDATION_CI_PAT are not configured; validation spine scan cannot run."
          {
            echo "## Validation Spine - token preflight"
            echo
            echo "Failed closed: neither repository secret \`SPINE_RO_TOKEN\` nor \`VALIDATION_CI_PAT\` is configured."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  spine-pr-scan:
    needs: spine-token-preflight
    if: ${{ always() && needs.spine-token-preflight.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SPINE_REF: 7766f10589b24971696c63d0235763a743cd9cd3  # pragma: allowlist secret
      SPINE_FILE_LIMIT: "5000"
      # Prefer a dedicated read-only spine token; fall back to this repo's
      # existing validation-CI PAT (used by validation-g8-dispatch.yml) so the
      # scan runs instead of failing closed when SPINE_RO_TOKEN is unset.
      SPINE_RO_TOKEN: ${{ secrets.SPINE_RO_TOKEN || secrets.VALIDATION_CI_PAT }}

    steps:
      # Spine's hardcoded `_PYTHON_REPOS` expects Schema sources at
      # `<workspace>/TraigentSchema/`, so check out at that subpath.
      - name: Checkout product repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: TraigentSchema

      - name: Checkout validation spine
        if: env.SPINE_RO_TOKEN != ''
        uses: actions/checkout@v7
        with:
          repository: Traigent/traigent-validation-spine
          ref: ${{ env.SPINE_REF }}
          path: .spine
          token: ${{ env.SPINE_RO_TOKEN }}

      - name: Capture PR changed files
        if: env.SPINE_RO_TOKEN != '' && github.event_name == 'pull_request'
        working-directory: TraigentSchema
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.spine-health"
          git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- 'traigent_schema/**' 'tests/**' 'pyproject.toml' '.github/workflows/validation-spine-pr.yml' \
            > "$GITHUB_WORKSPACE/.spine-health/pr-changed-files.txt"
          count="$(wc -l < "$GITHUB_WORKSPACE/.spine-health/pr-changed-files.txt" | tr -d ' ')"
          echo "Captured ${count} PR changed file(s) for scoped summary."

      - name: Set up Python 3.11
        if: env.SPINE_RO_TOKEN != ''
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        if: env.SPINE_RO_TOKEN != ''
        run: pip install --upgrade pip "uv==0.8.13"

      - name: Install spine
        if: env.SPINE_RO_TOKEN != ''
        working-directory: .spine
        run: uv sync --extra dev

      - name: Run security_ledger against product repo
        if: env.SPINE_RO_TOKEN != ''
        id: spine-run
        continue-on-error: true
        working-directory: .spine
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.spine-health"
          # The scanner still runs over the repository because the pinned
          # security-ledger CLI has no safe changed-file include switch here.
          # The summary below separates PR-touched findings from existing
          # repository-wide noise.
          ./.venv/bin/validation security-ledger run \
            --workspace-root "$GITHUB_WORKSPACE" \
            --health-dir "$GITHUB_WORKSPACE/.spine-health" \
            --file-limit "$SPINE_FILE_LIMIT"

      - name: Summarize new critical findings
        if: always() && env.SPINE_RO_TOKEN != ''
        working-directory: .spine
        run: |
          set -e
          GAPS="$GITHUB_WORKSPACE/.spine-health/latest-security-ledger-gaps.json"
          if [[ ! -f "$GAPS" ]]; then
            echo "::error::no gap report emitted by validation spine scan"
            exit 1
          fi
          ./.venv/bin/python - <<'PY'
          import json, os, pathlib
          gaps_path = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / ".spine-health" / "latest-security-ledger-gaps.json"
          changed_path = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / ".spine-health" / "pr-changed-files.txt"
          data = json.loads(gaps_path.read_text())
          by_severity = (data.get("summary") or {}).get("by_severity") or {}
          critical = by_severity.get("critical", 0)
          high     = by_severity.get("high", 0)
          medium   = by_severity.get("medium", 0)
          changed = {line.strip() for line in changed_path.read_text().splitlines()} if changed_path.exists() else set()

          def iter_gaps(payload):
              for key in ("gaps", "items", "blockers", "records", "findings"):
                  value = payload.get(key)
                  if isinstance(value, list):
                      return value
              return []

          def normalized_ref_path(gap):
              ref = str(gap.get("source_ref") or gap.get("path") or gap.get("file") or "")
              ref = ref.split("#", 1)[0]
              if ref.startswith("TraigentSchema/"):
                  ref = ref[len("TraigentSchema/"):]
              if ":" in ref:
                  ref = ref.rsplit(":", 1)[0]
              return ref

          scoped = {"critical": 0, "high": 0, "medium": 0}
          gap_items = iter_gaps(data)
          if changed and gap_items:
              for gap in gap_items:
                  ref = normalized_ref_path(gap)
                  if ref in changed:
                      severity = str(gap.get("severity") or "").lower()
                      if severity in scoped:
                          scoped[severity] += 1
          step_summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          with step_summary.open("a") as fh:
              fh.write("## Validation Spine — PR scan\n\n")
              fh.write("| Severity | Repo-wide count | PR-touched count |\n| --- | ---: | ---: |\n")
              fh.write(f"| critical | {critical} | {scoped['critical']} |\n")
              fh.write(f"| high | {high} | {scoped['high']} |\n")
              fh.write(f"| medium | {medium} | {scoped['medium']} |\n\n")
              if changed and not gap_items:
                  fh.write("PR-scoped counts unavailable: scanner output did not expose a parseable finding list.\n\n")
              if critical:
                  fh.write("**Critical repo-wide findings — review before merge.** ")
                  fh.write("Full detail in the `validation-spine-gaps` artifact below.\n")
              else:
                  fh.write("No critical findings.\n")
          print(
              f"critical={critical} high={high} medium={medium} "
              f"pr_critical={scoped['critical']} pr_high={scoped['high']} pr_medium={scoped['medium']}"
          )
          if critical:
              print(f"::warning::spine reported {critical} critical finding(s); see artifact")
          PY

      - name: Upload spine gap artifacts
        if: always() && env.SPINE_RO_TOKEN != ''
        uses: actions/upload-artifact@v7
        with:
          name: validation-spine-gaps
          path: .spine-health/
          retention-days: 14
          if-no-files-found: warn
