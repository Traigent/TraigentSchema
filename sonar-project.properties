sonar.host.url=https://sonarcloud.io
sonar.projectKey=Traigent_TraigentSchema
sonar.organization=traigent
sonar.projectName=TraigentSchema
sonar.sourceEncoding=UTF-8

# Branch analysis - main and develop are the long-lived branches.
sonar.branch.longLivedBranchesPattern=main|master|develop

# Sources and tests
sonar.sources=traigent_schema
sonar.tests=tests

# Python version matrix (matches .github/workflows/ci.yml)
sonar.python.version=3.9,3.10,3.11,3.12

# Coverage report path produced by pytest.
sonar.python.coverage.reportPaths=coverage.xml

# Structural exclusions - defensive even though sonar.sources is narrow.
# parity/ is a cross-SDK parity manifest, not first-party source.
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/build/**,**/dist/**,**/node_modules/**,**/coverage/**,**/.pytest_cache/**,**/.mypy_cache/**,**/.ruff_cache/**,**/migrations/**,**/vendor/**,**/__generated__/**,**/*.generated.*,**/*.egg-info/**,**/poetry.lock,**/uv.lock,parity/**

# Coverage exclusions
sonar.coverage.exclusions=**/test_*.py,**/tests/**,**/conftest.py,**/__init__.py,traigent_schema/version.py
