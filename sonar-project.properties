# SonarCloud Automatic Analysis (AutoScan) reads this file.
# Keep this file limited to AutoScan-supported scope settings.
# If this repo moves to CI-based analysis like traigent-js, restore CI/scanner
# keys such as host URL, project identity, branch setup, Python version, and
# coverage report paths in the workflow environment instead.

# Sources and tests
sonar.sources=traigent_schema
sonar.tests=tests

# Structural exclusions - defensive even though sonar.sources is narrow.
# parity/ is a cross-SDK parity manifest, not first-party source.
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/build/**,**/dist/**,**/node_modules/**,**/coverage/**,**/.pytest_cache/**,**/.mypy_cache/**,**/.ruff_cache/**,**/migrations/**,**/vendor/**,**/__generated__/**,**/*.generated.*,**/*.egg-info/**,**/poetry.lock,**/uv.lock,parity/**
