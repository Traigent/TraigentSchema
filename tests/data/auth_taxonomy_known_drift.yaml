  # ── Mismatch #12 — BE carries two divergent ResourceType enums ──────────────
  - id: be-resourcetype-divergent-enums
    detector_key: "backend.resource_types.divergent::unified_auth-vs-api_key_resource"
    symbol_or_value: "ResourceType (unified_auth: 7 members) != ResourceType (api_key_resource: 4 members)"
    repo: TraigentBackend
    surfaces: [TraigentBackend]
    owner: backend-auth
    phase_issue: "Schema#219 phase-1 (collapse to one Schema-aligned ResourceType)"
    remove_by: "Schema#219-enforce"
    note: >-
      unified_auth.ResourceType = {agent, experiment, benchmark, api_key, user,
      measure, system}; api_key_resource.ResourceType = {agent, benchmark,
      experiment, measure}. Same name, divergent membership, neither aligned to a
      Schema resource list. Collapse into one module-owned enum.

  # ── Mismatch #1 — five disagreeing API-key prefix sources ───────────────────
  # The canonical live-issuer set is {uk_, sk_, ak_, tk_} (uk_=user, sk_=service,
  # ak_=admin, tk_=temporary; sk_ also for device flow). Each row below names a
  # prefix-source set that is NOT equal to that canonical set.
  - id: prefix-be-middleware-set
    detector_key: "prefix.set.mismatch::backend.middleware_accepted"
    symbol_or_value: "BE middleware accepts {ak_, pk_, rk_, sk_, tg_, uk_}"
    repo: TraigentBackend
    surfaces: [TraigentBackend, TraigentSchema]
    owner: backend-auth
    phase_issue: "Schema#219 phase-2 (prefixes, additive)"
    remove_by: "Schema#219-enforce"
    note: >-
      Accepts orphan tg_ (issued by nobody) and pk_/rk_ (accepted but issued/
      validated by nobody); missing tk_. Converge on the canonical live-issuer
      set after confirming non-issuance of the orphans.

  - id: prefix-be-config-opt
    detector_key: "prefix.set.mismatch::backend.config_default"
    symbol_or_value: "BE config default prefix {opt_} (emits malformed opt__)"
    repo: TraigentBackend
    surfaces: [TraigentBackend, TraigentSchema]
    owner: backend-auth
    phase_issue: "Schema#219 phase-2 (delete the opt_ generator)"
    remove_by: "Schema#219-enforce"
    note: >-
      auth_constants.API_KEY_CONFIG['prefix']='opt_'; api_key_manager._generate_raw_key
      builds f'{prefix}_{random}' -> malformed 'opt__<random>'. Stale in-memory
      generator; the live DB issuer uses uk_/sk_/ak_/tk_. Delete.

  - id: prefix-sdk-validator-set
    detector_key: "prefix.set.mismatch::sdk.validator_accepted"
    symbol_or_value: "SDK validator accepts {ak_, sk_, tg_, tk_, uk_}"
    repo: Traigent
    surfaces: [Traigent, TraigentSchema]
    owner: sdk-python
    phase_issue: "Schema#219 phase-2 (prefixes, additive)"
    remove_by: "Schema#219-enforce"
    note: >-
      SDK accepts orphan tg_ (issued by no backend) on top of the canonical set.
      Drop tg_ acceptance after confirming non-issuance.

  - id: prefix-schema-device-sk-only
    detector_key: "prefix.set.mismatch::schema.device_flow"
    symbol_or_value: "Schema device-flow pins only {sk_}"
    repo: TraigentSchema
    surfaces: [TraigentSchema]
    owner: schema
    phase_issue: "Schema#219 phase-2 (publish the canonical prefix vocabulary in Schema)"
    remove_by: "Schema#219-enforce"
    note: >-
      device_token_success_schema.json pins '^sk_...'. Only the device-flow sk_
      path is consistent end-to-end; Schema does not yet own the full
      uk_/sk_/ak_/tk_ vocabulary. Publish it as the Schema source of truth.
